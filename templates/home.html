<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TODO LIST - Home</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">

    <style>
        .form-control {
            padding: 1.375rem .75rem !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <h3 class="pt-5 text-center">Django ToDo App</h3>

        <div class="row">
            <h4>My Day</h4>
            <p class="text-muted">17th April 2026</p>

            <!-- Tasks -->
            <div class="col-md-7" style="max-height: 450px; overflow-y: auto;">
                
                {% for task in tasks %}
                <div class="card m-1 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <span>{{ task.task }}</span>
                        <div class="d-flex gap-2">
                            <a href="#" class="btn btn-success btn-sm"><i class="fa fa-check"></i></a>
                            <a href="#" class="btn btn-danger btn-sm"><i class="fa fa-trash"></i></a>
                            <a href="#" class="btn btn-primary btn-sm"><i class="fa fa-pencil"></i></a>
                        </div>
                    </div>
                </div>
                {% endfor %}

            </div>

            <!-- Completed Tasks -->
            <div class="col-md-5">
                <h5>Completed Tasks</h5>
                {% for task in tasks %}
                <div class="card m-1 shadow-sm">
                    <div class="card-body d-flex justify-content-between align-items-center">
                        <span></span>
                        <a href="#" class="btn btn-danger btn-sm">
                            <i class="fa fa-times"></i>
                        </a>
                    </div>
                </div>
                {% endfor %}

            </div>
        </div>

        <!-- Form -->
        <div class="row">
            <div class="col-md-6 p-0" style="position: fixed; bottom: 20px;">
                <form action="{% url 'addTask' %}" method="POST">
                    {% csrf_token %}
                    <div class="d-flex">
                        <input type="text" name="task" class="form-control" placeholder="Add a task">
                        <button type="submit" class="btn btn-primary" style="width: 200px;">
                            <i class="fa fa-plus"></i> Add
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </div>
</body>
</html>
